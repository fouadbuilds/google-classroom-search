<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Classroom Search</title>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 12px;
    }
    p {
      font-size: 14px;
      color: #666;
      margin: 0 0 16px;
    }
    .shortcut {
      background: #f5f5f5;
      padding: 8px 12px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <h1>Google Classroom Search</h1>
  <p>Press <strong>Ctrl+K</strong> (or <strong>Cmd+K</strong> on Mac) on Google Classroom to activate search.</p>
  <div class="shortcut">Extension Ready</div>
</body>
</html>
